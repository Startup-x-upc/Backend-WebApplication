spring.application.name=Backend-WebApplication

# MySQL Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/chapa_tu_ruta?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:70771140}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy=org.example.backendwebapplication.shared.infrastructure.persistence.jpa.configuration.strategy.SnakeCaseWithPluralizedTablePhysicalNamingStrategy

# JWT
app.jwt.secret=${JWT_SECRET:ChapaTuRuta_UltraSecretKey_Min256Bits_ChangeInProduction!}

# Server
server.port=${PORT:8080}

# OpenAPI / Swagger
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
app.openapi.server-url=https://backend-webapplication-production.up.railway.app
documentation.application.description=ChapaTuRuta REST API — Identity & Access Management, Driver Management, and Monetization
documentation.application.version=1.0.0

# Ably Realtime Configuration
ably.api-key=${ABLY_API_KEY:oo1RAA.pJS-dg:4F1jr6oTkKIObegHIRSfK8aDBQLV6FtZoI2HTgFqbfU}

# Ride Request Configuration
app.ride.request-timeout-seconds=300


